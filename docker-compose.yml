##############################################################################
# Cadical Solutions (Laravel) — Docker Compose (production-like local stack)
##############################################################################

services:
  mysql:
    image: mysql:8.4
    container_name: cadical-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cadical
      MYSQL_USER: cadical
      MYSQL_PASSWORD: ${DB_PASSWORD:-cadical_dev_pass}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-cadical_dev_pass}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cadical-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    volumes:
      - storage:/var/www/html/storage/app

  nginx:
    image: nginx:1.27-alpine
    container_name: cadical-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage:/var/www/html/storage/app:ro

  # Runs pending migrations, then exits.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cadical-migrate
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    command: ["php", "artisan", "migrate", "--force"]
    restart: "no"

volumes:
  dbdata:
  storage:
