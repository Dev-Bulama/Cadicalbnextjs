##############################################################################
# Cadical Solutions (Laravel) — Nginx Configuration
# Place at /etc/nginx/sites-available/cadical and symlink to sites-enabled,
# or mount as-is into the `nginx` service in docker-compose.yml.
##############################################################################

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

upstream cadical_app {
    server app:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name cadical.com www.cadical.com;
    root /var/www/html/public;
    index index.php;

    # Security headers (mirrored here for edge caching; also set by
    # App\Http\Middleware\SecurityHeaders for non-proxied environments)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 25m;

    # Public folder — cache aggressively
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # User-uploaded files (product images, partner logos, site logo, etc).
    # Served directly from the shared `storage` volume rather than via the
    # public/storage symlink, since in this multi-container setup nginx and
    # app do not share a filesystem for a symlink to resolve across.
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    location /sw.js {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Auth routes — stricter rate limit
    location ~ ^/auth/(login|register) {
        limit_req zone=auth burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API routes — rate limited (Laravel's own throttle:api middleware
    # applies per-user/IP limits on top of this edge-level guard)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass cadical_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Block direct access to dotfiles and non-front-controller PHP
    location ~ /\. {
        deny all;
    }

    location ~* \.(env|log|sqlite)$ {
        deny all;
    }
}
